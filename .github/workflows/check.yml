name: Run Pyszne Checker

on:
  schedule:
    # Запуск каждые 5 минут. 
    # Внимание: на бесплатных тарифах GitHub могут быть задержки (может запускаться раз в 10-15 минут в зависимости от загрузки серверов).
    - cron: '*/5 * * * *'
  workflow_dispatch: # Эта строчка добавляет кнопку для ручного запуска в любое время

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run script
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        FORM_URL: ${{ secrets.FORM_URL }}
        MY_EMAIL: ${{ secrets.MY_EMAIL }}
        MY_NAME: ${{ secrets.MY_NAME }}
        MY_ID: ${{ secrets.MY_ID }}
      run: python pyszne_bot.py
